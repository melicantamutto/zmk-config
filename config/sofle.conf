CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y

# OLED display
CONFIG_ZMK_DISPLAY=y

# RGB underglow (ws2812) — breathing, on at start, pink-ish
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
CONFIG_SPI=y
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=1
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=330
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=85
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=80

CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
